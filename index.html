<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU Voxel RF Simulator</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #111; color: white; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-panel { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(20, 20, 20, 0.85); padding: 20px; border-radius: 12px; width: 320px; border: 1px solid #333; max-height: 90vh; overflow-y: auto;}
        h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .control-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.85rem; margin-bottom: 5px; color: #aaa; }
        input[type="number"] { width: 100%; padding: 8px; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0066cc; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0052a3; }
        #loading { display: none; margin-top: 10px; font-size: 0.9rem; color: #00ffcc; text-align: center; }
        #legend { position: absolute; bottom: 20px; right: 20px; z-index: 10; background: rgba(20, 20, 20, 0.85); padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .gradient-bar { width: 200px; height: 20px; border-radius: 4px; background: linear-gradient(to right, transparent, blue, cyan, yellow, red); margin-bottom: 5px; }
        .legend-labels { display: flex; justify-content: space-between; font-size: 0.8rem; color: #ccc; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="ui-panel">
        <h2>LiDAR RF Voxel Engine</h2>
        <div class="control-group">
            <label>Location (UTM Easting, Northing)</label>
            <div style="display: flex; gap: 10px;">
                <!-- Put an exact coordinate from your database here to test -->
                <input type="number" id="easting" value="519307" step="1">
                <input type="number" id="northing" value="4252958" step="1">
            </div>
        </div>
        <div class="control-group">
            <label>Simulation Radius (m)</label>
            <input type="number" id="radius" value="150" step="50">
        </div>
        <div class="control-group">
            <label>Voxel Resolution (m)</label>
            <input type="number" id="resolution" value="2.0" step="0.5">
        </div>
        <hr style="border-color:#444; margin:15px 0;">
        <div class="control-group"><label>Tx Frequency (MHz)</label><input type="number" id="freq" value="900"></div>
        <div class="control-group"><label>Tx Height (m AGL)</label><input type="number" id="tx_h" value="10"></div>
        <div class="control-group"><label>Tx Power (dBm)</label><input type="number" id="tx_p" value="43"></div>
        <div class="control-group"><label>Antenna Gain (dBi)</label><input type="number" id="tx_gain" value="18"></div>
        <div class="control-group"><label>Azimuth (deg)</label><input type="number" id="tx_az" value="180"></div>
        <div class="control-group"><label>Downtilt (deg)</label><input type="number" id="tx_el" value="-5"></div>
        <div class="control-group"><label>3dB Beamwidth</label><input type="number" id="beamwidth" value="65"></div>
        <button onclick="runSimulation()">Run Volumetric Simulation</button>
        <div id="loading">Voxelizing LiDAR & Raymarching...</div>
    </div>

    <div id="legend">
        <div style="margin-bottom: 5px; font-size: 0.9rem;">Rx Power (dBm)</div>
        <div class="gradient-bar"></div>
        <div class="legend-labels"><span>&lt;-100</span><span>-85</span><span>-70</span><span>-55</span><span>&gt;-40</span></div>
    </div>

    <div id="canvas-container"></div>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 10000);
        camera.position.set(0, 300, 300);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const ambientLight = new THREE.AmbientLight(0x606060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(500, 1000, 500);
        scene.add(dirLight);

        let terrainMesh = null, txMarker = null;

        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        animate();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });

        function dbmToColor(dbm) {
            if (dbm <= -100) return [30, 30, 30, 255]; 
            let t = Math.max(0, Math.min(1, (dbm + 100) / 60));
            let r, g, b;
            if (t < 0.33) { r = 0; g = Math.floor(t * 3 * 255); b = 255; }
            else if (t < 0.66) { let t2 = (t - 0.33) * 3; r = Math.floor(t2 * 255); g = 255; b = Math.floor((1 - t2) * 255); }
            else { let t3 = (t - 0.66) * 3; r = 255; g = Math.floor((1 - t3) * 255); b = 0; }
            return [r, g, b, 255];
        }

        async function runSimulation() {
            document.getElementById('loading').style.display = 'block';
            const payload = {
                easting: parseFloat(document.getElementById('easting').value),
                northing: parseFloat(document.getElementById('northing').value),
                radius: parseFloat(document.getElementById('radius').value),
                resolution: parseFloat(document.getElementById('resolution').value),
                freq_mhz: parseFloat(document.getElementById('freq').value),
                tx_height: parseFloat(document.getElementById('tx_h').value),
                tx_power: parseFloat(document.getElementById('tx_p').value),
                tx_gain: parseFloat(document.getElementById('tx_gain').value),
                tx_azimuth: parseFloat(document.getElementById('tx_az').value),
                tx_elevation: parseFloat(document.getElementById('tx_el').value),
                beamwidth: parseFloat(document.getElementById('beamwidth').value)
            };

            try {
                const response = await fetch('/api/simulate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if(!response.ok) { alert(await response.text()); return; }
                renderResults(await response.json(), payload);
            } catch (error) {
                alert("Simulation failed.");
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function renderResults(data, params) {
            if (terrainMesh) scene.remove(terrainMesh);
            if (txMarker) scene.remove(txMarker);

            // 1. Build Texture
            const texData = new Uint8Array(data.grid_w * data.grid_h * 4);
            for (let i = 0; i < data.heatmap_dbm.length; i++) {
                const color = dbmToColor(data.heatmap_dbm[i]);
                texData[i * 4] = color[0]; texData[i * 4 + 1] = color[1]; texData[i * 4 + 2] = color[2]; texData[i * 4 + 3] = color[3];
            }
            const texture = new THREE.DataTexture(texData, data.grid_w, data.grid_h, THREE.RGBAFormat);
            texture.magFilter = THREE.LinearFilter; texture.minFilter = THREE.LinearFilter;
            texture.needsUpdate = true;

            // 2. Build Extruded Voxel Surface Mesh
            const geom = new THREE.PlaneGeometry(params.radius * 2, params.radius * 2, data.grid_w - 1, data.grid_h - 1);
            geom.rotateX(-Math.PI / 2);

            const pos = geom.attributes.position.array;
            for (let i = 0; i < data.surface_heights.length; i++) {
                // PlaneGeometry vertices align row-by-row, matching our array directly!
                pos[i * 3 + 1] = data.surface_heights[i] - data.min_alt; 
            }
            geom.computeVertexNormals();

            const mat = new THREE.MeshPhongMaterial({ map: texture, color: 0xffffff, side: THREE.DoubleSide });
            terrainMesh = new THREE.Mesh(geom, mat);
            scene.add(terrainMesh);

            // 3. Add Antenna Marker
            txMarker = new THREE.Mesh(new THREE.CylinderGeometry(2, 2, params.tx_height), new THREE.MeshBasicMaterial({ color: 0xffffff }));
            let centerIdx = Math.floor(data.grid_h/2) * data.grid_w + Math.floor(data.grid_w/2);
            let groundH = data.surface_heights[centerIdx] - data.min_alt;
            txMarker.position.set(0, groundH + params.tx_height / 2, 0);

            // Invert the X and Z components so the WebGL Right-Handed coordinates
            // visually match the mathematical RF engine's mapping!
            const dir = new THREE.Vector3(
                -Math.sin(params.tx_azimuth*Math.PI/180)*Math.cos(params.tx_elevation*Math.PI/180),
                Math.sin(params.tx_elevation*Math.PI/180),
                -Math.cos(params.tx_azimuth*Math.PI/180)*Math.cos(params.tx_elevation*Math.PI/180)
            ).normalize();
            
            txMarker.add(new THREE.ArrowHelper(dir, new THREE.Vector3(0, params.tx_height/2, 0), 50, 0xffff00, 10, 5));
            scene.add(txMarker);
        }
    </script>
</body>
</html>
